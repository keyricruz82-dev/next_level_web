<body>

    <script>
        async function testBanner() {
            const results = document.getElementById('results');
            
            // Simulación de pruebas en diferentes resoluciones
            const testResolutions = [
                { width: 400, name: 'Móvil Pequeño (400px)', expectedTitle: '24px', expectedBtn: '13px' },
                { width: 600, name: 'Móvil (600px)', expectedTitle: '32px', expectedBtn: '14px' },
                { width: 900, name: 'Tablet (900px)', expectedTitle: '48px', expectedBtn: '15px' },
                { width: 1200, name: 'Desktop (1200px)', expectedTitle: '56px', expectedBtn: '16px' }
            ];

            let html = '<h2>📊 Pruebas de Responsive Design</h2>';
            
            for (const test of testResolutions) {
                html += `
                    <div class="test-result">
                        <div class="resolution">📱 ${test.name}</div>
                        <p style="margin: 8px 0; color: #666;">
                            <strong>Tamaño de título esperado:</strong> <code>${test.expectedTitle}</code><br>
                            <strong>Tamaño de botón esperado:</strong> <code>${test.expectedBtn}</code>
                        </p>
                        <p style="font-size: 12px; color: #999; margin-top: 8px;">
                            Para verificar: Redimensiona detalle-evento.html a ${test.width}px y recarga esta página
                        </p>
                    </div>
                `;
            }

            // Verificar si puede acceder a detalle-evento.html
            html += `
                <h2 style="margin-top: 30px;">🔗 Estado de Carga</h2>

                    <p><strong>Ubicación:</strong> <code>${window.location.href}</code></p>
                </div>
            `;

            results.innerHTML = html;
        }

        // Ejecutar pruebas cuando se carga la página
        document.addEventListener('DOMContentLoaded', testBanner);
        
        // Reejecutar en cada resize
        window.addEventListener('resize', testBanner);

<html>
<head>
<style>
body { font-family: monospace; margin: 20px; }
pre { background: #f5f5f5; padding: 15px; border-radius: 8px; overflow: auto; }
.success { color: green; font-weight: bold; }
.error { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>Verificación de Galería</h2>
<p>Revisando estructura del archivo script.js...</p>
<pre id=" result\></pre>
<script>
fetch('file:///c:/xampp/xampp/htdocs/next_level_web/js/script.js')
 .then(r => r.text())
 .then(text => {
 const hasInitFunction = text.includes('function initCuratedGalleryMosaic');
 const hasInitCall = text.includes('initCuratedGalleryMosaic()');
 const hasSizePattern = text.includes('sizePattern');
 
 let result = '';
 result += hasInitFunction ? '<span class=\success\>✓</span> Función initCuratedGalleryMosaic declarada\n' : '<span class=\error\>✗</span> Falta función\n';
 result += hasInitCall ? '<span class=\success\>✓</span> Función es llamada en DOMContentLoaded\n' : '<span class=\error\>✗</span> Falta llamada\n';
 result += hasSizePattern ? '<span class=\success\>✓</span> Patrón de tamaños definido\n' : '<span class=\error\>✗</span> Falta patrón\n';
 
 document.getElementById('result').innerHTML = result;
 })
 .catch(e => document.getElementById('result').innerText = 'Error: ' + e);
</script>
</body>
</html>

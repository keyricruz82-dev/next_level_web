<script src="js/script.js?v=20260424"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const details = {
      bodas: {
        title: 'Bodas Elegantes',
        tag: 'Producción / Boda',
        badge: 'Bodas Elegantes',
        image: 'images/2ULI08.jpeg',
        alt: 'Bodas Elegantes',
        intro: 'Una cobertura nupcial cinematográfica que captura la esencia del evento.',
        text: 'Ofrecemos grabación profesional, fotografía artística, iluminación y edición de alta calidad. Cada boda se documenta con planos emocionales, detalles del vestido, el primer baile y los momentos más íntimos para crear un recuerdo inolvidable.',
        gallery: [
          { img: 'images/2ULI08.jpeg', alt: 'Detalle de la novia' },
          { img: 'images/2ULI5.jpeg', alt: 'Ceremonia' },
          { img: 'images/2ULI01.jpeg', alt: 'Primer baile' },
          { img: 'images/2ULI6.jpeg', alt: 'Celebración' },
          { img: 'images/2UL0.jpeg', alt: 'Momento familiar' },
          { img: 'images/2ULI02.jpeg', alt: 'Detalles de la boda' }
        ]
      },
      cumpleanos: {
        title: 'Fiestas de Cumpleaños',
        tag: 'Producción / Cumpleaños',
        badge: 'Fiestas de Cumpleaños',
        image: 'images/2UL0.jpeg',
        alt: 'Fiestas de Cumpleaños',
        intro: 'Eventos llenos de color, música y recuerdos inolvidables.',
        text: 'Diseñamos experiencias únicas para todas las edades, con cobertura de animación, entrevistas a invitados, montaje de highlights y fotografías espontáneas. Ideal para celebraciones familiares y eventos con estilo.',
        gallery: [
          { img: 'images/2UL0.jpeg', alt: 'Entrada al evento' },
          { img: 'images/2ULI5.jpeg', alt: 'Diversión y risas' },
          { img: 'images/2ULI6.jpeg', alt: 'Decoración' },
          { img: 'images/2ULI01.jpeg', alt: 'Pastel de cumpleaños' },
          { img: 'images/2ULI02.jpeg', alt: 'Momentos especiales' },
          { img: 'images/2ULI03.jpeg', alt: 'Familia reunida' },
          { img: 'images/2ULI5.jpeg', alt: 'Familia reunida' },
          { img: 'images/2ULI01.jpeg', alt: 'Familia reunida' },
          { img: 'images/2ULI3.jpeg', alt: 'Familia reunida' },
          { img: 'images/2ULI06.jpeg', alt: 'Familia reunida' }
        ]
      },
      corporativos: {
        title: 'Eventos Corporativos',
        tag: 'Producción / Corporativo',
        badge: 'Eventos Corporativos',
        image: 'images/2ULI1.jpeg',
        alt: 'Eventos Corporativos',
        intro: 'Cobertura profesional para conferencias, lanzamientos y encuentros ejecutivos.',
        text: 'Brindamos soportes audiovisuales, edición de contenido institucional, multicámara y piezas para redes sociales. Nuestro equipo enfatiza calidad, imagen de marca y un mensaje claro para cada audiencia.',
        gallery: [
          { img: 'images/2ULI1.jpeg', alt: 'Inicio de la conferencia' },
          { img: 'images/2UL14.jpeg', alt: 'Presentador principal' },
          { img: 'images/2UL111.jpg', alt: 'Panel de discusión' },
          { img: 'images/2UL1.jpg', alt: 'Asistentes' },
          { img: 'images/2UL0.jpeg', alt: 'Networking' },
          { img: 'images/2UL11.jpg', alt: 'Clausura del evento' }
        ]
      },
      graduaciones: {
        title: 'Graduaciones',
        tag: 'Producción / Graduación',
        badge: 'Graduaciones',
        image: 'images/2UL2.jpeg',
        alt: 'Graduaciones',
        intro: 'Capturamos el orgullo del momento con estilo documental y emotivo.',
        text: 'Desde la ceremonia hasta las celebraciones posteriores, inmortalizamos logros con videos de alta calidad, entrevistas a graduados y piezas para redes sociales. La experiencia está pensada para familias y promociones.',
        gallery: [
          { img: 'images/2UL2.jpeg', alt: 'Procesión de graduados' },
          { img: 'images/2UL21.jpg', alt: 'Recibiendo diploma' },
          { img: 'images/2UL22.jpeg', alt: 'Foto oficial'},
          { img: 'images/2UL23.jpg', alt: 'Celebración con familia'},
          { img: 'images/2UL0.jpeg', alt: 'Momentos de alegría'},
          { img: 'images/2UL24.jpg', alt: 'Promoción completa'}
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = params.get('evento') || 'bodas';
    const detail = details[key] || details.bodas;

    document.getElementById('detailTitle').textContent = detail.title;
    document.getElementById('overlayTitle').textContent = detail.title;
    document.getElementById('detailTag').textContent = detail.tag;
    document.getElementById('detailIntro').textContent = detail.intro;
    document.getElementById('detailText').textContent = detail.text;
    document.getElementById('detailBadge').textContent = detail.badge;

    const detailImg = document.getElementById('detailImg');
    detailImg.src = detail.image;
    detailImg.alt = detail.alt;

    // BANNER RESPONSIVE - Adaptación visual para móviles, tablets y desktop
    // ========================================
    
    function applyBannerResponsiveStyles() {
      const screenWidth = window.innerWidth;
      const detailMedia = document.querySelector('.detail-page .detail-media');
      const overlayContent = document.querySelector('.overlay-content');
      const overlayTitle = document.getElementById('overlayTitle');
      const verGaleriaBtn = document.getElementById('verGaleriaBtn');
      const overlayLogo = document.querySelector('.overlay-logo');
      const overlayLogoImg = document.querySelector('.overlay-logo img');
      
      if (!detailMedia || !overlayContent || !overlayTitle || !verGaleriaBtn) return;
      
      // Establecer clase base
      detailMedia.classList.add('has-overlay-logo');
      
      // Configurar responsive según ancho de pantalla
      let titleFontSize, btnFontSize, btnPadding, logoWidth, logoMargin, contentGap;
      
      if (screenWidth < 480) {
        // Móviles pequeños (< 480px)
        titleFontSize = '24px';
        btnFontSize = '13px';
        btnPadding = '10px 20px';
        logoWidth = '35px';
        logoMargin = '12px 0';
        contentGap = '12px';
      } else if (screenWidth < 768) {
        // Móviles (480px - 768px)
        titleFontSize = '32px';
        btnFontSize = '14px';
        btnPadding = '12px 24px';
        logoWidth = '40px';
        logoMargin = '14px 0';
        contentGap = '14px';
      } else if (screenWidth < 1024) {
        // Tablets (768px - 1024px)
        titleFontSize = '48px';
        btnFontSize = '15px';
        btnPadding = '14px 32px';
        logoWidth = '50px';
        logoMargin = '16px 0';
        contentGap = '16px';
      } else {
        // Desktop (> 1024px)
        titleFontSize = '56px';
        btnFontSize = '16px';
        btnPadding = '16px 40px';
        logoWidth = '60px';
        logoMargin = '18px 0';
        contentGap = '18px';
      }
      
      // Aplicar estilos al título
      overlayTitle.style.fontSize = titleFontSize;
      overlayTitle.style.fontWeight = '700';
      overlayTitle.style.lineHeight = '1.2';
      overlayTitle.style.textAlign = 'center';
      overlayTitle.style.color = 'white';
      overlayTitle.style.textShadow = '0 2px 8px rgba(0, 0, 0, 0.5)';
      overlayTitle.style.wordWrap = 'break-word';
      overlayTitle.style.margin = '0';
      
      // Aplicar estilos al botón
      verGaleriaBtn.style.fontSize = btnFontSize;
      verGaleriaBtn.style.padding = btnPadding;
      verGaleriaBtn.style.whiteSpace = 'nowrap';
      verGaleriaBtn.style.display = 'inline-block';
      verGaleriaBtn.style.minWidth = '140px';
      verGaleriaBtn.style.textAlign = 'center';
      
      // Aplicar estilos al contenedor del overlay
      overlayContent.style.display = 'flex';
      overlayContent.style.flexDirection = 'column';
      overlayContent.style.alignItems = 'center';
      overlayContent.style.justifyContent = 'center';
      overlayContent.style.gap = contentGap;
      
      // Aplicar estilos al logo
      if (overlayLogo) {
        overlayLogo.style.display = 'flex';
        overlayLogo.style.justifyContent = 'center';
        overlayLogo.style.alignItems = 'center';
        overlayLogo.style.margin = logoMargin;
        overlayLogo.style.gap = contentGap;
      }
      
      // Aplicar estilos a la imagen del logo
      if (overlayLogoImg) {
        overlayLogoImg.setAttribute('aria-hidden', 'true');
        overlayLogoImg.style.width = logoWidth;
        overlayLogoImg.style.height = 'auto';
        overlayLogoImg.style.maxWidth = '100%';
        overlayLogoImg.style.objectFit = 'contain';
      }
    }
    
    // Aplicar estilos responsive al cargar la página
    applyBannerResponsiveStyles();
    
    // Reaplica estilos responsive al cambiar el tamaño de la ventana (con debounce)
    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        applyBannerResponsiveStyles();
      }, 250);
    });

    document.getElementById('detailPageTitle').textContent = detail.title;
    document.getElementById('detailPageSubtitle').textContent = `Descubre la descripción completa para ${detail.title}.`;
    document.getElementById('galleryTitle').textContent = `Galería - ${detail.title}`;
    document.title = `${detail.title} | Next Level Producciones`;

    // Cargar galería
    const galleryGrid = document.getElementById('galleryGrid');
    detail.gallery.forEach((item, index) => {
      const card = document.createElement('a');
      card.href = '#';
      card.className = 'gallery-card';
      if (index === 0) card.classList.add('large');
      if (index === 1 || index === 2) card.classList.add('medium');
      if (index === 3) card.classList.add('wide');
      
      card.innerHTML = `
        <img src="${item.img}" alt="${item.alt}">
        <div class="gallery-overlay">
          <span>Galería</span>
          <h3>${item.alt}</h3>
        </div>
      `;
      
      galleryGrid.appendChild(card);
    });

    // Manejar botón Ver Galería
    const verGaleriaBtn = document.getElementById('verGaleriaBtn');
    const eventGallery = document.getElementById('event-gallery');
    const detailTextBox = document.getElementById('detailTextBox');

    verGaleriaBtn.addEventListener('click', function(e) {
      e.preventDefault();
      eventGallery.classList.toggle('hidden');
      detailTextBox.classList.toggle('hidden');
      
      // Scroll a la galería si se abre
      if (!eventGallery.classList.contains('hidden')) {
        setTimeout(() => {
          eventGallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    });
  });
</script>
